<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>☠️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh}
canvas{display:block;width:100vw;height:100vh}
#fps{position:fixed;top:10px;right:10px;color:#ff0000;font-family:monospace;font-size:18px;font-weight:bold;text-shadow:0 0 20px #ff0000;pointer-events:none}
#warn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,50,50,0.7);font-family:monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;pointer-events:none;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fps">-- FPS</div>
<div id="warn">gpu destruction mode</div>
<script>
const canvas=document.getElementById('c');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
const gl=canvas.getContext('webgl',{antialias:false,powerPreference:'high-performance'})||canvas.getContext('experimental-webgl');
if(!gl){document.body.innerHTML='<div style="color:white;height:100vh;display:flex;align-items:center;justify-content:center">no webgl</div>';throw 0;}

const FS_VOL=`
precision highp float;
uniform vec2 u_res;
uniform float u_time;
#define TAU 6.28318530718
#define STEPS 256
#define STEP 0.018
#define SS 2
float h13(vec3 p){p=fract(p*vec3(443.897,441.423,437.195));p+=dot(p,p.yxz+19.19);return fract((p.x+p.y)*p.z);}
float h12(vec2 p){vec3 q=fract(vec3(p.xyx)*.1031);q+=dot(q,q.yzx+33.33);return fract((q.x+q.y)*q.z);}
float vn(vec3 p){
  vec3 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
  return mix(mix(mix(h13(i),h13(i+vec3(1,0,0)),f.x),mix(h13(i+vec3(0,1,0)),h13(i+vec3(1,1,0)),f.x),f.y),
             mix(mix(h13(i+vec3(0,0,1)),h13(i+vec3(1,0,1)),f.x),mix(h13(i+vec3(0,1,1)),h13(i+vec3(1,1,1)),f.x),f.y),f.z);
}
mat2 r2(float a){return mat2(cos(a),-sin(a),sin(a),cos(a));}
float fbm(vec3 p){
  float v=0.,a=.5;
  for(int i=0;i<12;i++){v+=a*vn(p);p.xz=r2(.72)*p.xz;p.xy=r2(.35)*p.xy;p=p*2.13+vec3(99.7);a*=.48;}
  return v;
}
float warp4(vec3 p,float t){
  vec3 q=vec3(fbm(p+vec3(0,0,t*.12)),fbm(p+vec3(5.2,1.3,t*.10)),fbm(p+vec3(1.7,9.2,t*.08)));
  vec3 r=vec3(fbm(p+4.*q+vec3(1.7,9.2,t*.06)),fbm(p+4.*q+vec3(8.3,2.8,t*.07)),fbm(p+4.*q+vec3(3.1,6.4,t*.05)));
  vec3 s=vec3(fbm(p+4.*r+vec3(6.3,t*.04,2.1)),fbm(p+4.*r+vec3(t*.03,4.4,8.2)),fbm(p+4.*r+vec3(5.5,3.3,t*.06)));
  vec3 w=vec3(fbm(p+4.*s+vec3(2.1,t*.05,7.3)),fbm(p+4.*s+vec3(t*.04,6.1,3.5)),fbm(p+4.*s+vec3(4.4,t*.03,1.9)));
  return fbm(p+4.*w);
}
float sdS(vec3 p,float r){return length(p)-r;}
float sdT(vec3 p,vec2 t){return length(vec2(length(p.xz)-t.x,p.y))-t.y;}
float sdB(vec3 p,vec3 b){vec3 q=abs(p)-b;return length(max(q,0.))+min(max(q.x,max(q.y,q.z)),0.);}
float sdCap(vec3 p,vec3 a,vec3 b,float r){vec3 pa=p-a,ba=b-a;return length(pa-ba*clamp(dot(pa,ba)/dot(ba,ba),0.,1.))-r;}
float sm(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}
float scene(vec3 p,float t){
  vec3 p1=vec3(r2(t*.5)*p.xz,p.y).xzy;
  vec3 p2=vec3(p.x,r2(t*.35)*p.yz);
  vec3 p3=vec3(r2(t*.2)*p.xy,p.z).xzy;
  float a=sdS(p,.55+.18*sin(t*2.3));
  float b=sdT(p1,vec2(1.2+.12*sin(t*1.4),.22));
  float c=sdT(p2,vec2(.95+.1*cos(t*1.8),.18));
  float d=sdT(p3,vec2(.7+.08*sin(t*2.1),.15));
  float e=sdB(p-vec3(sin(t*.7)*.5,cos(t*.5)*.4,sin(t*.3)*.3),vec3(.2));
  float f=sdCap(p,vec3(sin(t)*.9,-.9,0.),vec3(cos(t)*.9,.9,0.),.1);
  float g=sdCap(p,vec3(0.,sin(t*1.1)*.9,-.9),vec3(0.,cos(t*1.1)*.9,.9),.1);
  vec3 fp=fract(p*.4)*2.5-1.25;float h2=sdS(fp,.3)*2.5;
  vec3 fp2=fract(p*.8+.5)*1.25-.625;float i2=sdB(fp2,vec3(.15))*1.25;
  float j=sdS(p-vec3(cos(t*.6)*1.5,sin(t*.4)*1.2,sin(t*.8)*.8),.2+.05*sin(t*3.));
  return sm(sm(sm(sm(sm(sm(sm(sm(sm(a,b,.3),c,.3),d,.25),e,.2),f,.2),g,.2),h2,.4),i2,.3),j,.15);
}
vec3 lights(vec3 pos,float t){
  vec3 col=vec3(0.);
  col+=vec3(1.,.3,.1)/(1.+pow(length(pos-vec3(sin(t*1.1)*2.,cos(t*.9)*1.5,sin(t*.7)*2.)),2.)*2.);
  col+=vec3(.1,.4,1.)/(1.+pow(length(pos-vec3(cos(t*.8)*2.,sin(t*1.3)*1.5,cos(t*1.1)*2.)),2.)*2.);
  col+=vec3(.8,1.,.2)/(1.+pow(length(pos-vec3(sin(t*1.4+2.1)*1.5,cos(t)*2.,sin(t*.6)*1.5)),2.)*2.);
  col+=vec3(1.,.1,.8)/(1.+pow(length(pos-vec3(cos(t*.7+1.)*1.5,sin(t*.8),cos(t*1.4)*2.)),2.)*2.);
  col+=vec3(.2,1.,.8)/(1.+pow(length(pos-vec3(sin(t*.9+3.)*2.5,cos(t*1.2)*.8,cos(t*.5))),2.)*2.);
  col+=vec3(1.,.8,.1)/(1.+pow(length(pos-vec3(cos(t*1.3+2.),sin(t*.6)*2.5,sin(t)*1.5)),2.)*2.);
  col+=vec3(.5,.1,1.)/(1.+pow(length(pos-vec3(sin(t*.5+1.5)*3.,cos(t*1.4)*1.2,cos(t*.9)*.8)),2.)*2.);
  col+=vec3(.1,1.,.4)/(1.+pow(length(pos-vec3(cos(t*1.2+.5)*.8,sin(t*1.1)*3.,sin(t*.8))),2.)*2.);
  col+=vec3(1.,.6,.2)/(1.+pow(length(pos-vec3(sin(t*2.)*1.2,cos(t*1.7)*.6,sin(t*1.3)*1.8)),2.)*2.);
  col+=vec3(.3,.9,1.)/(1.+pow(length(pos-vec3(cos(t*1.9)*1.8,sin(t*.4)*1.1,cos(t*2.2)*.7)),2.)*2.);
  col+=vec3(1.,.2,.5)/(1.+pow(length(pos-vec3(sin(t*.3+2.)*2.2,cos(t*2.1)*.5,sin(t*1.6)*1.3)),2.)*2.);
  col+=vec3(.6,1.,.3)/(1.+pow(length(pos-vec3(cos(t*1.5)*1.4,sin(t*1.8)*1.9,cos(t*.6+1.)*1.1)),2.)*2.);
  return col;
}
vec3 pal(float t,vec3 b,vec3 c,vec3 d){return vec3(.5)+vec3(.5)*cos(TAU*(c*t+d+b));}
vec3 sampleRay(vec3 ro,vec3 rd,float t){
  vec3 vol=vec3(0.);float tr=1.;vec3 pos=ro;
  for(int i=0;i<STEPS;i++){
    pos+=rd*STEP;
    if(length(pos)>5.) break;
    float d1=warp4(pos*1.0,t)-.44;
    float d2=fbm(pos*2.1+vec3(t*.06,0,t*.04))-.50;
    float d3=fbm(pos*4.3-vec3(0,t*.05,t*.03))-.54;
    float d4=fbm(pos*8.+t*.08)-.57;
    float d5=fbm(pos*15.+t*.1)-.58;
    float dens=max(0.,d1*.45+d2*.25+d3*.15+d4*.1+d5*.05);
    float sd=scene(pos,t);
    dens+=max(0.,.15-sd)*12.;dens*=.8;
    if(dens>.001){
      float p1=fbm(pos*2.+t*.08),p2=fbm(pos*3.5-t*.06),p3=warp4(pos*.7,t),p4=fbm(pos*6.+t*.12);
      vec3 emit=pal(p1+t*.03,vec3(0,.33,.67),vec3(1,1,1),vec3(0))*1.5;
      emit+=pal(p2-t*.04,vec3(.5,.2,.25),vec3(2,1,0),vec3(0))*.9;
      emit+=pal(p3+t*.05,vec3(.8,.9,.3),vec3(1,1,.5),vec3(0))*.6;
      emit+=pal(p4+t*.02,vec3(.3,.6,.1),vec3(1,.5,2),vec3(0))*.4;
      emit+=lights(pos,t)*1.5;
      emit+=pal(t*.1,vec3(0,.33,.67),vec3(1,1,1),vec3(0))*exp(-abs(sd)*6.)*5.;
      emit+=vec3(2.,1.,.3)*exp(-length(pos)*2.)*4.;
      vol+=tr*dens*4.*emit;
      tr*=exp(-dens*5.*STEP);
      if(tr<.002) break;
    }
  }
  float st=pow(max(0.,h12(rd.xy*900.+vec2(47.3,23.1))-.976)*42.,2.);
  vec3 bg=pal(fbm(rd*2.+t*.01),vec3(.5,.2,.25),vec3(2,1,0),vec3(0))*fbm(rd*4.+t*.02)*.35;
  bg+=vec3(st*.8,st*.9,st);
  return vol+bg*tr;
}
void main(){
  float t=u_time;float ct=t*.18;
  vec3 ro=vec3(sin(ct)*4.+cos(ct*1.3)*.9,cos(ct*.75)*3.+sin(ct*1.6)*.7,cos(ct)*4.+sin(ct*1.1)*.9);
  vec3 ta=vec3(sin(t*.4)*.7,cos(t*.3)*.5,sin(t*.2)*.4);
  vec3 ww=normalize(ta-ro),uu=normalize(cross(ww,vec3(0,1,0))),vv=cross(uu,ww);
  vec3 col=vec3(0.);
  for(int sx=0;sx<SS;sx++){for(int sy=0;sy<SS;sy++){
    vec2 off=(vec2(float(sx),float(sy))+.5)/float(SS)-.5;
    vec2 uv=((gl_FragCoord.xy+off)-.5*u_res)/min(u_res.x,u_res.y);
    float dl=length(uv);uv+=uv*dl*dl*.07;
    vec3 rd=normalize(uv.x*uu+uv.y*vv+1.5*ww);
    col+=sampleRay(ro,rd,t);
  }}
  col/=float(SS*SS);
  col=col/(col+vec3(1.));col=pow(max(col,vec3(0.)),vec3(.4545));
  vec2 vUV=gl_FragCoord.xy/u_res;
  col*=pow(vUV.x*vUV.y*(1.-vUV.x)*(1.-vUV.y)*16.,.28);
  gl_FragColor=vec4(col,1.);
}`;

const FS_BLOOM=`
precision highp float;
uniform vec2 u_res;uniform sampler2D u_tex;uniform float u_time;
void main(){
  vec2 uv=gl_FragCoord.xy/u_res,px=1./u_res;
  vec3 bloom=vec3(0.);float total=0.;
  for(int x=-8;x<=8;x++){for(int y=-8;y<=8;y++){
    float w=exp(-float(x*x+y*y)*.06);
    bloom+=texture2D(u_tex,uv+vec2(float(x),float(y))*px*2.5).rgb*w;total+=w;
  }}
  bloom/=total;
  vec3 base=texture2D(u_tex,uv).rgb;
  gl_FragColor=vec4(base+max(vec3(0.),bloom-.35)*1.8,1.);
}`;

const FS_POST=`
precision highp float;
uniform vec2 u_res;uniform float u_time;uniform sampler2D u_tex;
float h12(vec2 p){vec3 q=fract(vec3(p.xyx)*.1031);q+=dot(q,q.yzx+33.33);return fract((q.x+q.y)*q.z);}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;float t=u_time;
  float g=step(.996,h12(vec2(floor(uv.y*300.),floor(t*40.))));
  float sh=(h12(vec2(floor(uv.y*300.)+1.,floor(t*40.)))-.5)*.04*g;
  float ca=.005+.003*sin(t*4.7);
  vec3 col=vec3(texture2D(u_tex,uv+vec2(ca+sh,0.)).r,texture2D(u_tex,uv+vec2(sh*.5,0.)).g,texture2D(u_tex,uv-vec2(ca-sh,0.)).b);
  col*=.93+.07*sin(uv.y*u_res.y*3.14159*2.);
  col*=.97+.03*sin(uv.x*u_res.x*3.14159*1.5+t*2.);
  col+=(h12(uv+vec2(t*.13,t*.09))-.5)*.05;
  col+=(h12(uv+vec2(t*.07,t*.15))-.5)*.03;
  col=mix(vec3(dot(col,vec3(.299,.587,.114))),col,1.4);
  col=pow(max(col,vec3(0.)),vec3(1.15,1.0,.88));
  gl_FragColor=vec4(col,1.);
}`;

const VS=`attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`;
function mkP(fs){
  const p=gl.createProgram(),v=gl.createShader(gl.VERTEX_SHADER),f=gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(v,VS);gl.compileShader(v);gl.shaderSource(f,fs);gl.compileShader(f);
  if(!gl.getShaderParameter(f,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(f));
  gl.attachShader(p,v);gl.attachShader(p,f);gl.linkProgram(p);return p;
}
const pV=mkP(FS_VOL),pB=mkP(FS_BLOOM),pP=mkP(FS_POST);
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
function bq(prog){const loc=gl.getAttribLocation(prog,'a');gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);}
function mkFBO(w,h){
  const tex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const fbo=gl.createFramebuffer();gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);return{fbo,tex};
}
let W=canvas.width,H=canvas.height,fb1=mkFBO(W,H),fb2=mkFBO(W,H);
window.addEventListener('resize',()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;gl.viewport(0,0,W,H);fb1=mkFBO(W,H);fb2=mkFBO(W,H);});
function pass(prog,target,texSrc,t){
  gl.bindFramebuffer(gl.FRAMEBUFFER,target);gl.viewport(0,0,W,H);gl.useProgram(prog);bq(prog);
  if(texSrc){gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,texSrc);gl.uniform1i(gl.getUniformLocation(prog,'u_tex'),0);}
  const rl=gl.getUniformLocation(prog,'u_res'),tl=gl.getUniformLocation(prog,'u_time');
  if(rl)gl.uniform2f(rl,W,H);if(tl)gl.uniform1f(tl,t);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}
const t0=performance.now();let frames=0,lastFps=t0;
const fpsEl=document.getElementById('fps');
function render(){
  const now=performance.now(),t=(now-t0)/1000;
  pass(pV,fb1.fbo,null,t);
  pass(pB,fb2.fbo,fb1.tex,t);
  pass(pP,null,fb2.tex,t);
  frames++;
  if(now-lastFps>=1000){
    const fps=frames;
    fpsEl.textContent=fps+' FPS 💀';
    fpsEl.style.color=fps<=2?'#ff0000':fps<=8?'#ff3300':fps<=20?'#ff7700':'#ffcc00';
    frames=0;lastFps=now;
  }
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
